<!DOCTYPE html><html><head><meta charset="utf-8"><title>NIAL API</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#030305;color:#d1d1de;font-family:monospace;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas#m{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;opacity:.25}
.c{position:relative;z-index:2;background:rgba(6,6,9,.97);border:2px solid #f30;padding:40px;width:540px;text-align:center;box-shadow:0 0 50px rgba(255,51,0,.2)}
h1{font-size:34px;font-weight:900;letter-spacing:4px;color:#fff;text-shadow:0 0 15px rgba(255,51,0,.4)}
.s{font-size:11px;color:#f30;letter-spacing:3px;font-weight:bold;margin-bottom:20px}
.g{text-align:left;margin-bottom:15px}.g label{display:block;font-size:12px;color:#f6;margin-bottom:5px;font-weight:bold}
.g input{width:100%;background:#000;border:1px solid #211;padding:12px;color:#0f3;font-family:monospace;font-size:14px}
.g input:focus{outline:none;border-color:#f30}.p{display:flex;align-items:center;justify-content:center;gap:20px;background:#000;border:1px solid #211;padding:15px;margin-bottom:20px}
canvas#a{border:1px solid #f30;background:#111}.n{background:rgba(255,51,0,.05);border-left:3px solid #f30;padding:12px;margin:20px 0;font-size:12px;color:#fa6;text-align:left;font-weight:bold}
.b{display:block;width:100%;background:#09090d;color:#fff;border:1px solid #f30;padding:16px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:10px}
.b:hover{background:#f30;color:#000;box-shadow:0 0 30px rgba(255,51,0,.6)}.t{display:inline-block;margin-top:15px;font-size:12px;color:#8c8c9e;text-decoration:underline;cursor:pointer}
.h{display:none}</style></head><body><canvas id="m"></canvas><div class="c"><h1>NIAL PROTOCOL</h1><div class="s" id="t">NIAL API // AUTH NODE</div>
<div id="l"><div class="g"><label>NIAL-TOKEN ИЛИ КРИПТО-КЛЮЧ:</label><input type="text" id="lt" placeholder="Введите ваш секретный токен"></div><div class="n">NOTE: МЫ НЕЗАВИСИМЫ НИ ОТ КОГО.</div><button class="b" onclick="pL()">ОТПРАВИТЬ ПАКЕТ В ЛАУНЧЕР</button><div class="t" onclick="sS('#register')">Впервые на NIAL? Создайте бесплатную учетную запись</div></div>
<div id="r" class="h"><div class="p"><canvas id="a" width="64" height="64"></canvas><button class="b" style="padding:8px;font-size:11px;width:auto;margin:0" onclick="gA()">СЛУЧАЙНЫЙ АВАТАР</button></div><div class="g"><label>НИКНЕЙМ (LOGIN):</label><input type="text" id="rn" placeholder="Придумайте ник"></div><div class="g"><label>ПОЧТА (EMAIL) [ОПЦ]:</label><input type="email" id="re" placeholder="user@nialcraft.ru"></div><div class="g"><label>ПАРОЛЬ (PASSWORD):</label><input type="password" id="rp" placeholder="••••••••"></div><div class="n">NOTE: МЫ НЕЗАВИСИМЫ НИ ОТ КОГО.</div><button class="b" style="background:#235a23;border-color:#0f3" onclick="pR()">ЗАРЕГИСТРИРОВАТЬ ПРОФИЛЬ</button><div class="t" onclick="sS('#login')">Уже есть аккаунт? Войти в сеть NIAL</div></div></div>
<script>
const mc=document.getElementById('m'),m=mc.getContext('2d');mc.width=window.innerWidth;mc.height=window.innerHeight;const al="NIAL_API_3.0_⚡☠☢⚙",fs=18,cl=mc.width/fs,rd=Array(Math.floor(cl)).fill(1);
function dM(){m.fillStyle='rgba(3,3,5,0.06)';m.fillRect(0,0,mc.width,mc.height);m.fillStyle='#ff3300';m.font=fs+'px monospace';for(let i=0;i<rd.length;i++){m.fillText(al.charAt(Math.floor(Math.random()*al.length)),i*fs,rd[i]*fs);if(rd[i]*fs>mc.height&&Math.random()>0.985)rd[i]=0;rd[i]++}}setInterval(dM,35);
let avD="";function gA(){const ac=document.getElementById('a'),a=ac.getContext('2d'),ps=8;let cls=[];const clr=`hsl(${Math.floor(Math.random()*360)},80%,50%)`;a.fillStyle="#111115";a.fillRect(0,0,64,64);for(let x=0;x<4;x++){for(let y=0;y<8;y++){const act=Math.random()>0.4;cls.push(act);if(act){a.fillStyle=clr;a.fillRect(x*ps,y*ps,ps,ps);a.fillRect((7-x)*ps,y*ps,ps,ps)}}}avD=btoa(JSON.stringify(cls))}
function sS(h){window.location.hash=h;const l=document.getElementById('l'),r=document.getElementById('r'),t=document.getElementById('t');if(h==='#register'){l.classList.add('h');r.classList.remove('h');t.innerText="NIAL API // REGISTER NODE";gA()}else{r.classList.add('h');l.classList.remove('h');t.innerText="NIAL API // AUTH NODE"}}
window.onload=window.onhashchange=()=>sS(window.location.hash==='#register'?'#register':'#login');
function pR(){const n=document.getElementById('rn').value.trim(),e=document.getElementById('re').value.trim()||"no-email",p=document.getElementById('rp').value.trim();if(!n||!p){alert("Ошибка: Заполните поля!");return}
const h="NIAL_PACKET_"+btoa(unescape(encodeURIComponent(JSON.stringify({n:n,e:e,p:btoa(p),av:avD}))));document.getElementById('r').innerHTML=`<div style="background:#000;border:1px solid #0f3;padding:20px;margin-bottom:20px;"><div style="color:#0f3;font-weight:bold;margin-bottom:10px;">[ПАКЕТ ЗАПИСАН В NIAL API]</div><p style="font-size:12px;color:#8c8c9e">Скопируйте адресную строку из браузера и вставьте её в лаунчер.</p></div><button class="b" style="background:#f30" id="cb">СКОПИРОВАТЬ ССЫЛКУ УЧЕТКИ</button>`;
window.history.pushState({},'',window.location.origin+window.location.pathname+"?nial_hash="+h+"#login");document.getElementById('cb').onclick=()=>{navigator.clipboard.writeText(window.location.href);alert("NIAL-LINK скопирован!")}}
function pL(){const t=document.getElementById('lt').value.trim();if(!t){alert("Введите токен!");return}window.history.pushState({},'',window.location.origin+window.location.pathname+"?nial_token="+t+"#login");navigator.clipboard.writeText(window.location.href);alert("Ссылка скопирована!")}
</script></body></html>
